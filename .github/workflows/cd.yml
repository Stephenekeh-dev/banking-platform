name: CI — Build, Test & Push Images

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev, main ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test — corebanking
  # ─────────────────────────────────────────────
  test-corebanking:
    name: Test — corebanking
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: corebanking

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corebanking-test-reports
          path: corebanking/target/surefire-reports/

  # ─────────────────────────────────────────────
  # JOB 2: Build & Test — audit-service
  # ─────────────────────────────────────────────
  test-audit-service:
    name: Test — audit-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audit-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-service-test-reports
          path: audit-service/target/surefire-reports/

  # ─────────────────────────────────────────────
  # JOB 3: Build & Test — api-gate
  # ─────────────────────────────────────────────
  test-api-gate:
    name: Test — api-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-gate-test-reports
          path: api-gate/target/surefire-reports/

  # ─────────────────────────────────────────────
  # JOB 4: Build Docker Images & Push to ECR
  # Only runs on push to dev (not PRs), and only
  # if ALL test jobs passed
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ test-corebanking, test-audit-service, test-api-gate ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    strategy:
      matrix:
        service:
          - name: corebanking
            ecr_repo: banking-platform/corebanking
          - name: audit-service
            ecr_repo: banking-platform/audit-service
          - name: api-gate
            ecr_repo: banking-platform/api-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR — ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.name }}
        run: ./mvnw package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Docker image — ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.name }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:dev-latest \
            .

      - name: Push Docker image — ${{ matrix.service.name }}
        run: |
          docker push $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:dev-latest

      - name: Output image URI
        run: |
          echo " Pushed: $ECR_REGISTRY/${{ matrix.service.ecr_repo }}:${{ steps.tag.outputs.IMAGE_TAG }}"