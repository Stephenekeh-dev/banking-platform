apiVersion: apps/v1
kind: Deployment
metadata:
  name: corebanking
  namespace: banking-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corebanking
  template:
    metadata:
      labels:
        app: corebanking
    spec:
      containers:
        - name: corebanking
          image: banking-platform/corebanking:latest
          imagePullPolicy: Never        # ← critical: use local image
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: banking-platform-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: corebanking
  namespace: banking-platform
spec:
  selector:
    app: corebanking
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP