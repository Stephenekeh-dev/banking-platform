apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: banking-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: banking-platform/audit-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: banking-platform-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-platform-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: banking-platform
spec:
  selector:
    app: audit-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP