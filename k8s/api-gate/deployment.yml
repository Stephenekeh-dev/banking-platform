apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gate
  namespace: banking-platform
  labels:
    app: api-gate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gate
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gate
    spec:
      containers:
        - name: api-gate
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/banking-platform/api-gate:latest
          ports:
            - containerPort: 9080
          envFrom:
            - configMapRef:
                name: banking-platform-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "125m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gate
  namespace: banking-platform
spec:
  selector:
    app: api-gate
  ports:
    - protocol: TCP
      port: 9080
      targetPort: 9080
  type: ClusterIP
---
# Ingress — routes external traffic into the cluster via api-gate
# Requires AWS Load Balancer Controller installed on your EKS cluster
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-platform-ingress
  namespace: banking-platform
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gate
                port:
                  number: 9080
