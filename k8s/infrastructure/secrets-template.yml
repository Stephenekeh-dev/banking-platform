# NOTE: Do NOT commit real values here.
# Real values are injected at deploy time from GitHub Secrets
# using: kubectl create secret generic banking-platform-secrets --from-literal=...
#
# To create this secret manually (first time setup):
#
#   kubectl create secret generic banking-platform-secrets \
#     --namespace=banking-platform \
#     --from-literal=DB_PASSWORD=<your-db-password> \
#     --from-literal=JWT_SECRET=<your-jwt-secret> \
#     --from-literal=DB_URL=<your-db-url> \
#     --from-literal=DB_USERNAME=<your-db-username>

apiVersion: v1
kind: Secret
metadata:
  name: banking-platform-secrets
  namespace: banking-platform
type: Opaque
# stringData values are placeholders — replaced by CI/CD pipeline
stringData:
  DB_URL: "REPLACED_BY_CICD"
  DB_USERNAME: "REPLACED_BY_CICD"
  DB_PASSWORD: "REPLACED_BY_CICD"
  JWT_SECRET: "REPLACED_BY_CICD"